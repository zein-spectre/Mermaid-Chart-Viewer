<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mermaid Diagram Viewer</title>
  <!-- Mermaid 11.13.0 loaded as ESM module (see bottom script) to support ZenUML external diagram -->
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@400;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #0e0f14;
      --surface: #161720;
      --surface2: #1e2030;
      --border: #2a2d3e;
      --accent: #7c6af7;
      --accent2: #4fc4cf;
      --text: #cdd6f4;
      --text-muted: #6c7086;
      --text-dim: #45475a;
      --editor-bg: #12131a;
      --preview-bg: #0e0f14;
      --sidebar-w: 220px;
      --font-mono: 'JetBrains Mono', monospace;
      --font-ui: 'Syne', sans-serif;
      --tr: 0.32s cubic-bezier(0.4, 0, 0.2, 1);
    }

    [data-theme="light"] {
      --bg: #f0f0f5;
      --surface: #fff;
      --surface2: #e8e8f0;
      --border: #d0d0e0;
      --accent: #5a4fd4;
      --accent2: #2a9da8;
      --text: #1e1e2e;
      --text-muted: #6c6c8a;
      --text-dim: #a0a0b8;
      --editor-bg: #f8f8fc;
      --preview-bg: #f0f0f5;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-ui);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: background var(--tr), color var(--tr);
    }

    /* ── HEADER ── */
    header {
      height: 52px;
      flex-shrink: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 10px;
      z-index: 20;
    }

    .logo {
      font-size: 15px;
      font-weight: 800;
      letter-spacing: -0.3px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      user-select: none;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: .5px;
      text-transform: uppercase;
      -webkit-text-fill-color: var(--text-muted);
    }

    .logo-divider {
      font-size: 13px;
      color: var(--text-dim);
      margin: 0 2px;
      user-select: none;
    }

    .logo-by {
      font-size: 11px;
      color: var(--text-dim);
      font-family: var(--font-mono);
      letter-spacing: .3px;
      white-space: nowrap;
    }

    header .spacer {
      flex: 1;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #a6e3a1;
      flex-shrink: 0;
      transition: background .2s;
    }

    .status-dot.error {
      background: #f38ba8;
    }

    .status-label {
      font-size: 11px;
      color: var(--text-muted);
      font-family: var(--font-mono);
    }

    .icon-btn {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      transition: all .15s;
      flex-shrink: 0;
    }

    .icon-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .icon-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(124, 106, 247, .1);
    }

    /* ── BODY ── */
    .body-wrap {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: width var(--tr), opacity var(--tr), min-width var(--tr);
      min-width: var(--sidebar-w);
    }

    .sidebar.collapsed {
      width: 0;
      min-width: 0;
      opacity: 0;
      pointer-events: none;
    }

    .sidebar-header {
      height: 40px;
      display: flex;
      align-items: center;
      padding: 0 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .sidebar-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .sidebar-section {
      padding: 12px 12px 4px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--text-dim);
      white-space: nowrap;
    }

    .dtype-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 0 8px;
      overflow-y: auto;
      flex: 1;
      padding-bottom: 20px;
    }

    .dtype-list::-webkit-scrollbar {
      width: 4px;
    }

    .dtype-list::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    .dtype-btn {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 10px;
      border-radius: 7px;
      border: 1px solid transparent;
      background: none;
      cursor: pointer;
      color: var(--text-muted);
      font-family: var(--font-ui);
      font-size: 12px;
      font-weight: 600;
      text-align: left;
      white-space: nowrap;
      transition: all .15s;
      width: 100%;
    }

    .dtype-btn:hover {
      background: var(--surface2);
      color: var(--text);
      border-color: var(--border);
    }

    .dtype-btn.active {
      background: rgba(124, 106, 247, .1);
      color: var(--accent);
      border-color: rgba(124, 106, 247, .28);
    }

    .dtype-icon {
      width: 26px;
      height: 26px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      background: var(--surface2);
      flex-shrink: 0;
    }

    .dtype-btn.active .dtype-icon {
      background: rgba(124, 106, 247, .18);
    }

    .dtype-label {
      flex: 1;
    }

    .dtype-badge {
      font-size: 9px;
      font-family: var(--font-mono);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 1px 5px;
      color: var(--text-dim);
      flex-shrink: 0;
    }

    .dtype-btn.active .dtype-badge {
      background: rgba(124, 106, 247, .12);
      border-color: rgba(124, 106, 247, .3);
      color: var(--accent);
    }

    .tpl-list {
      display: none;
      flex-direction: column;
      gap: 1px;
      padding: 2px 8px 6px 34px;
    }

    .tpl-list.visible {
      display: flex;
    }

    .tpl-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 8px;
      border-radius: 5px;
      border: none;
      background: none;
      cursor: pointer;
      color: var(--text-dim);
      font-family: var(--font-mono);
      font-size: 10px;
      text-align: left;
      white-space: nowrap;
      transition: all .12s;
      width: 100%;
    }

    .tpl-btn:hover {
      background: var(--surface2);
      color: var(--text);
    }

    .tpl-btn::before {
      content: '↳';
      font-size: 10px;
      opacity: .4;
      margin-right: 2px;
    }

    /* ── MAIN ── */
    .main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── EDITOR ── */
    .editor-panel {
      width: 400px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: var(--editor-bg);
      border-right: 1px solid var(--border);
      transition: width var(--tr), opacity var(--tr), transform var(--tr);
      overflow: hidden;
    }

    .editor-panel.hidden {
      width: 0;
      opacity: 0;
      transform: translateX(-20px);
      pointer-events: none;
    }

    .panel-header {
      height: 40px;
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 8px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--surface);
    }

    .panel-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .8px;
      text-transform: uppercase;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .panel-header .spacer {
      flex: 1;
    }

    .type-tag {
      font-size: 9px;
      font-family: var(--font-mono);
      padding: 2px 7px;
      border-radius: 3px;
      background: rgba(124, 106, 247, .1);
      border: 1px solid rgba(124, 106, 247, .22);
      color: var(--accent);
      white-space: nowrap;
    }

    .btn-clear {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-dim);
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 8px;
      cursor: pointer;
      white-space: nowrap;
      transition: color .15s, border-color .15s;
    }

    .btn-clear:hover {
      color: var(--text);
      border-color: var(--text-muted);
    }

    .editor-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #editor {
      width: 100%;
      height: 100%;
      background: var(--editor-bg);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
      line-height: 1.7;
      border: none;
      outline: none;
      resize: none;
      padding: 20px;
      tab-size: 2;
      caret-color: var(--accent);
      transition: background var(--tr), color var(--tr);
    }

    #editor::placeholder {
      color: var(--text-dim);
    }

    #editor::-webkit-scrollbar {
      width: 6px;
    }

    #editor::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    /* ── DIVIDER ── */
    .divider {
      width: 4px;
      background: var(--border);
      cursor: col-resize;
      flex-shrink: 0;
      transition: background .15s;
    }

    .divider:hover,
    .divider.dragging {
      background: var(--accent);
    }

    /* ── PREVIEW ── */
    .preview-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--preview-bg);
      overflow: hidden;
    }

    .preview-header {
      height: 40px;
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 8px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--surface);
    }

    .preview-header .spacer {
      flex: 1;
    }

    .btn {
      font-family: var(--font-ui);
      font-size: 12px;
      font-weight: 600;
      padding: 6px 13px;
      border-radius: 6px;
      border: 1px solid var(--border);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all .15s;
      white-space: nowrap;
      background: var(--surface2);
      color: var(--text);
    }

    .btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--surface);
    }

    .btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .btn.active:hover {
      background: #6a5be0;
    }

    .zoom-badge {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 3px 8px;
      min-width: 44px;
      text-align: center;
      flex-shrink: 0;
      cursor: default;
      user-select: none;
    }

    .zoom-slider-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .zoom-slider-icon {
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
      user-select: none;
      width: 20px;
      text-align: center;
      transition: color .15s;
      flex-shrink: 0;
    }

    .zoom-slider-icon:hover {
      color: var(--accent);
    }

    #zoomSlider {
      -webkit-appearance: none;
      appearance: none;
      width: 110px;
      height: 4px;
      border-radius: 2px;
      background: var(--border);
      outline: none;
      cursor: pointer;
      flex-shrink: 0;
      transition: background .15s;
    }

    #zoomSlider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      border: 2px solid var(--surface);
      box-shadow: 0 0 0 1px var(--accent);
      transition: transform .1s;
    }

    #zoomSlider::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    #zoomSlider::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      border: 2px solid var(--surface);
      box-shadow: 0 0 0 1px var(--accent);
    }

    .preview-viewport {
      flex: 1;
      position: relative;
      overflow: hidden;
      cursor: default;
    }

    .preview-viewport.panning {
      cursor: grabbing !important;
    }

    .preview-viewport.space-held {
      cursor: grab;
    }

    #canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      transform-origin: 0 0;
    }

    #canvas.smooth-transform {
      transition: transform 0.3s cubic-bezier(0.2, 0, 0, 1);
    }

    #diagram-output {
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: visible;
    }

    #diagram-output svg {
      height: auto;
      display: block;
      border-radius: 6px;
      overflow: visible;
    }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-content {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 400px;
      max-width: 90%;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      transform: scale(0.95) translateY(10px);
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      flex-direction: column;
    }

    .modal-overlay.active .modal-content {
      transform: scale(1) translateY(0);
    }

    .modal-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .modal-close {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 18px;
      padding: 4px;
      display: flex;
      border-radius: 4px;
    }

    .modal-close:hover {
      color: var(--text);
      background: var(--surface2);
    }

    .modal-body {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group label {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .select-input,
    .text-input {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 6px;
      font-family: var(--font-ui);
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }

    .select-input:focus,
    .text-input:focus {
      border-color: var(--accent);
    }

    .radio-group {
      display: flex;
      gap: 12px;
    }

    .radio-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text);
      cursor: pointer;
    }

    .modal-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      background: var(--surface2);
      border-radius: 0 0 12px 12px;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .btn-primary:hover {
      background: #6a5be0;
    }

    .error-message {
      font-family: var(--font-mono);
      font-size: 12px;
      color: #f38ba8;
      background: rgba(243, 139, 168, .08);
      border: 1px solid rgba(243, 139, 168, .2);
      border-radius: 8px;
      padding: 16px 20px;
      max-width: 500px;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .empty-hint {
      text-align: center;
      color: var(--text-dim);
    }

    .empty-hint .icon {
      font-size: 38px;
      margin-bottom: 12px;
      opacity: .45;
    }

    .empty-hint p {
      font-size: 13px;
      line-height: 1.6;
      font-family: var(--font-mono);
    }

    .kb-hint {
      position: absolute;
      bottom: 16px;
      left: 16px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-dim);
      z-index: 5;
      pointer-events: none;
      line-height: 1.9;
    }

    kbd {
      display: inline-block;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 1px 5px;
      font-family: var(--font-mono);
      font-size: 9px;
    }

    /* ── HIDE MERMAID NATIVE ERROR VISUALS ── */
    /* Mermaid injects its bomb/error SVG into body — hide leftover ones.
     NOTE: We do NOT hide body > svg globally because Mermaid needs
     temporary SVGs in body for text measurement during rendering. */
    #d0,
    #d1,
    #d2,
    #d3,
    #d4,
    #d5 {
      display: none !important;
      width: 0 !important;
      height: 0 !important;
      overflow: hidden !important;
      pointer-events: none !important;
    }
  </style>
</head>

<body>

  <header>
    <button class="icon-btn active" id="btnSidebarToggle" title="Toggle sidebar">☰</button>
    <span class="logo">MERMAID</span>
    <span class="logo-sub">Viewer</span>
    <span class="logo-divider">|</span>
    <span class="logo-by">by Salam MZein</span>
    <div class="spacer"></div>
    <div class="status-dot" id="statusDot"></div>
    <span class="status-label" id="statusLabel">ready</span>
  </header>

  <div class="body-wrap">

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">Diagram Types</span>
      </div>
      <div class="dtype-list">

        <div class="sidebar-section">General</div>

        <button class="dtype-btn active" data-type="flowchart" id="dtype-flowchart">
          <span class="dtype-icon">◈</span>
          <span class="dtype-label">Flowchart</span>
          <span class="dtype-badge">graph</span>
        </button>
        <div class="tpl-list visible" id="tpl-flowchart">
          <button class="tpl-btn" data-tpl="flowchart-basic">Basic flow</button>
          <button class="tpl-btn" data-tpl="flowchart-lr">Left → Right</button>
          <button class="tpl-btn" data-tpl="flowchart-decision">Decision tree</button>
          <button class="tpl-btn" data-tpl="flowchart-subgraph">Subgraph</button>
        </div>

        <button class="dtype-btn" data-type="sequence" id="dtype-sequence">
          <span class="dtype-icon">⇄</span>
          <span class="dtype-label">Sequence</span>
          <span class="dtype-badge">seq</span>
        </button>
        <div class="tpl-list" id="tpl-sequence">
          <button class="tpl-btn" data-tpl="seq-basic">Basic messages</button>
          <button class="tpl-btn" data-tpl="seq-activation">Activation</button>
          <button class="tpl-btn" data-tpl="seq-loop">Loop &amp; Alt</button>
          <button class="tpl-btn" data-tpl="seq-parallel">Parallel</button>
          <button class="tpl-btn" data-tpl="seq-notes">Notes &amp; Rect</button>
          <button class="tpl-btn" data-tpl="seq-actors">Actor types</button>
          <button class="tpl-btn" data-tpl="seq-creation">Create &amp; Destroy</button>
          <button class="tpl-btn" data-tpl="seq-critical">Critical region</button>
          <button class="tpl-btn" data-tpl="seq-autonumber">Autonumber</button>
        </div>

        <div class="sidebar-section">UML</div>

        <button class="dtype-btn" data-type="class" id="dtype-class">
          <span class="dtype-icon">⬡</span>
          <span class="dtype-label">Class Diagram</span>

  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11.13.0/dist/mermaid.esm.min.mjs';
    import zenuml from 'https://cdn.jsdelivr.net/npm/@mermaid-js/mermaid-zenuml@0.2.2/dist/mermaid-zenuml.esm.min.mjs';
    await mermaid.registerExternalDiagrams([zenuml]);

    (function () {

      /* ═══════════════════════════════════════════════════════
         TEMPLATES  — all verified against Mermaid 10.9.3 syntax
      ═══════════════════════════════════════════════════════ */
      const T = {

        /* FLOWCHART */
        'flowchart-basic':
          `graph TD
A([Start]) --> B{Is it working?}
B -->|Yes| C[Ship it]
B -->|No| D[Debug]
D --> E[Fix the issue]
E --> B
C --> F([Done])`,

        'flowchart-lr':
          `graph LR
A[Input] --> B[Process A]
A --> C[Process B]
B --> D{Merge?}
C --> D
D --> E[Output]`,

        'flowchart-decision':
          `graph TD
A[User Login] --> B{Credentials valid?}
B -->|Yes| C{Has 2FA?}
B -->|No| F[Show error]
C -->|Yes| D[Request OTP]
C -->|No| E[Grant access]
D --> G{OTP correct?}
G -->|Yes| E
G -->|No| H[Block attempt]`,

        'flowchart-subgraph':
          `graph TB
subgraph Frontend
  A[React App] --> B[API Client]
end
subgraph Backend
  C[REST API] --> D[Business Logic]
  D --> E[(Database)]
end
B --> C`,

        /* SEQUENCE */
        'seq-basic':
          `sequenceDiagram
participant Alice
participant John
Alice->>John: Hello John, how are you?
John-->>Alice: Great!
Alice-)John: See you later!`,

        'seq-activation':
          `sequenceDiagram
Alice->>+John: Hello John, how are you?
Alice->>+John: John, can you hear me?
John-->>-Alice: Hi Alice, I can hear you!
John-->>-Alice: I feel great!`,

        'seq-loop':
          `sequenceDiagram
Alice->>Bob: Hello Bob, how are you?
alt is sick
    Bob->>Alice: Not so good
else is well
    Bob->>Alice: Feeling fresh like a daisy
end
opt Extra response
    Bob->>Alice: Thanks for asking
end
loop Every minute
    Alice-->>Bob: Are you OK?
end`,

        'seq-parallel':
          `sequenceDiagram
par Alice to Bob
    Alice->>Bob: Hello guys!
and Alice to John
    Alice->>John: Hello guys!
end
Bob-->>Alice: Hi Alice!
John-->>Alice: Hi Alice!`,

        'seq-notes':
          `sequenceDiagram
participant Alice
participant John
Note right of Alice: Alice calls John.
Alice->>+John: Hello John, how are you?
Alice->>+John: John, can you hear me?
John-->>-Alice: Hi Alice, I can hear you!
John-->>-Alice: I feel great!
Note over Alice,John: A typical interaction`,

        'seq-actors':
          `sequenceDiagram
participant API as Public API
participant Auth as Auth Service
participant DB as User Database
API->>Auth: Login request
Auth->>DB: Query user
DB-->>Auth: User data
Auth-->>API: Access token`,

        'seq-creation':
          `sequenceDiagram
Alice->>Bob: Hello Bob, how are you?
Bob->>Alice: Fine, thank you. And you?
create participant Carl
Alice->>Carl: Hi Carl!
destroy Carl
Alice-xCarl: We are too many
destroy Bob
Bob->>Alice: I agree`,

        'seq-critical':
          `sequenceDiagram
critical Establish a connection to the DB
    Service-->DB: connect
option Network timeout
    Service-->Service: Log error
option Credentials rejected
    Service-->Service: Log different error
end`,

        'seq-autonumber':
          `sequenceDiagram
autonumber
Alice->>John: Hello John, how are you?
loop HealthCheck
    John->>John: Fight against hypochondria
end
Note right of John: Rational thoughts!
John-->>Alice: Great!
John->>Bob: How about you?
Bob-->>John: Jolly good!`,

        /* CLASS DIAGRAM */
        'class-basic':
          `classDiagram
Animal <|-- Duck
Animal <|-- Fish
Animal <|-- Zebra
Animal : +int age
Animal : +String gender
Animal : +isMammal()
Animal : +mate()
class Duck{
  +String beakColor
  +swim()
  +quack()
}
class Fish{
  -int sizeInFeet
  -canEat()
}
class Zebra{
  +bool is_wild
  +run()
}`,

        'class-members':
          `classDiagram
class BankAccount{
  +String owner
  +BigDecimal balance
  +deposit(amount) bool
  +withdrawal(amount) int
  +getHistory() List~Transaction~
  +clearAccount() void
}
class Transaction{
  +String id
  +BigDecimal amount
  +Date timestamp
  +getDetails() String
}
BankAccount "1" --> "*" Transaction : records`,

        'class-relations':
          `classDiagram
classA <|-- classB : Inheritance
classC *-- classD : Composition
classE o-- classF : Aggregation
classG --> classH : Association
classI -- classJ : Link
classK ..> classL : Dependency
classM ..|> classN : Realization
classO .. classP : Dashed`,

        'class-inheritance':
          `classDiagram
class Shape{
  <<interface>>
  +draw() void
  +getArea() float
}
class Circle{
  +float radius
  +draw() void
  +getArea() float
}
class Rectangle{
  +float width
  +float height
  +draw() void
  +getArea() float
}
class Triangle{
  +float base
  +float height
  +draw() void
  +getArea() float

      };

      const TYPE_LABELS = { flowchart: 'Flowchart', sequence: 'Sequence', class: 'Class Diagram', state: 'State Diagram', er: 'ER Diagram', journey: 'User Journey', gantt: 'Gantt', pie: 'Pie Chart', quadrant: 'Quadrant Chart', gitgraph: 'Git Graph', c4: 'C4 Diagram', mindmap: 'Mindmap', timeline: 'Timeline', zenuml: 'ZenUML', sankey: 'Sankey', xychart: 'XY Chart', block: 'Block Diagram', packet: 'Packet Diagram', kanban: 'Kanban', architecture: 'Architecture', radar: 'Radar Chart', treemap: 'Treemap', venn: 'Venn Diagram' };
      const TYPE_DEFAULT = { flowchart: 'flowchart-basic', sequence: 'seq-basic', class: 'class-basic', state: 'state-basic', er: 'er-basic', journey: 'journey-basic', gantt: 'gantt-basic', pie: 'pie-basic', quadrant: 'quadrant-basic', gitgraph: 'git-basic', c4: 'c4-context', mindmap: 'mindmap-basic', timeline: 'timeline-basic', zenuml: 'zen-basic', sankey: 'sankey-basic', xychart: 'xy-bar', block: 'block-basic', packet: 'packet-basic', kanban: 'kanban-basic', architecture: 'arch-basic', radar: 'radar-basic', treemap: 'treemap-basic', venn: 'venn-basic' };

      /* ═══════════════════════════════════════
         STATE
      ═══════════════════════════════════════ */
      let isFullWindow = false, isSidebarOpen = true, isDark = true;
      let renderTimer = null, currentType = 'flowchart';
      let tx = 0, ty = 0, scale = 1;
      const MIN_SCALE = 0.5, MAX_SCALE = 5, ZOOM_SPEED = 1.2;
      let isPanning = false, panStartX = 0, panStartY = 0, panOriginTx = 0, panOriginTy = 0;
      let spaceHeld = false, middleDown = false;
      let isDivDragging = false, divStartX = 0, divStartW = 400;
      let renderId = 0;

      // Touch/Gesture State
      let isTouchPanning = false;
      let initialPinchDistance = null;
      let initialScale = 1;
      let touchStartX = 0, touchStartY = 0;

      /* ═══════════════════════════════════════
         ELEMENTS
      ═══════════════════════════════════════ */
      const editor = document.getElementById('editor');
      const edPanel = document.getElementById('editorPanel');
      const divider = document.getElementById('divider');
      const viewport = document.getElementById('viewport');
      const canvas = document.getElementById('canvas');
      const diagOut = document.getElementById('diagram-output');
      const zoomBadge = document.getElementById('zoomBadge');
      const statusDot = document.getElementById('statusDot');
      const statusLbl = document.getElementById('statusLabel');
      const sidebar = document.getElementById('sidebar');
      const typeTag = document.getElementById('typeTag');
      const btnSB = document.getElementById('btnSidebarToggle');
      const btnFull = document.getElementById('btnFullWindow');
      const btnTheme = document.getElementById('btnTheme');
      const btnReset = document.getElementById('btnReset');
      const btnClear = document.getElementById('btnClear');

      /* ═══════════════════════════════════════
         MERMAID
         10.9.3 render() needs a container that
         exists in the DOM as 3rd argument.
         We create one hidden div, append it to
         body once, and reuse it forever.
      ═══════════════════════════════════════ */
      let mermaidTheme = 'dark';

      function initMermaid() {
        mermaid.initialize({
          startOnLoad: false,
          theme: mermaidTheme,
          securityLevel: 'loose',
          fontFamily: 'JetBrains Mono, monospace',
          flowchart: {
            useMaxWidth: false,
            nodeSpacing: 60,
            rankSpacing: 80,
            padding: 20,
            htmlLabels: true,
          },
          sequence: {
            useMaxWidth: false,
            actorMargin: 80,
            messageMargin: 50,
            boxMargin: 20,
            noteMargin: 20,
            mirrorActors: true,
          },
          gantt: {
            useMaxWidth: false,
            fontSize: 14,
            barHeight: 24,
            barGap: 6,
            topPadding: 60,
            rightPadding: 80,
            leftPadding: 120,
            gridLineStartPadding: 40,
            numberSectionStyles: 4,
            axisFormat: '%Y-%m-%d',
          },
          xyChart: { useMaxWidth: false, width: 900, height: 600 },
          class: {
            useMaxWidth: false,
            nodeSpacing: 80,
            rankSpacing: 80,
            padding: 20,
          },
          state: {
            useMaxWidth: false,
            nodeSpacing: 60,
            rankSpacing: 60,
            padding: 20,
          },
          er: {
            useMaxWidth: false,
            fontSize: 14,
            layoutDirection: 'TB',
          },
          journey: {
            useMaxWidth: false,
            sectionWidth: 200,
            sectionHeight: 52,
          },
          pie: { useMaxWidth: false },
          mindmap: { useMaxWidth: false, padding: 20 },
          timeline: { useMaxWidth: false, padding: 20 },
          sankey: { useMaxWidth: false },
          packet: { useMaxWidth: false },
          block: { useMaxWidth: false, padding: 20 },
        });
      }
      initMermaid();

      let isRendering = false;

      async function render() {
        const code = editor.value.trim();
        if (!code) {
          diagOut.innerHTML = '<div class="empty-hint"><div class="icon">◈</div><p>Diagram akan muncul di sini<br>setelah Anda mulai mengetik.</p></div>';
          setStatus('ready', false);
          return;
        }
        setStatus('rendering…', false);
        const id = 'mmd' + (++renderId);
        try {
          // Re-initialize mermaid to reset parser state between diagram types
          initMermaid();
          diagOut.innerHTML = '';
          // Flag to prevent MutationObserver from removing Mermaid's temporary
          // SVG elements in body during text measurement.
          isRendering = true;
          // Use a temporary wide off-screen container for rendering so Mermaid
          // calculates chart layout at a generous width (prevents label overlap).
          const tmpContainer = document.createElement('div');
          tmpContainer.style.cssText = 'position:absolute;left:-9999px;top:-9999px;width:1500px;height:1000px;';
          document.body.appendChild(tmpContainer);
          const { svg } = await mermaid.render(id, code, tmpContainer);
          tmpContainer.remove();
          isRendering = false;
          diagOut.innerHTML = svg;
          const svgEl = diagOut.querySelector('svg');
          if (svgEl) {
            const isZenUML = code.trim().toLowerCase().startsWith('zenuml');
            if (isZenUML) {
              // ZenUML uses foreignObject inside SVG with hardcoded dimensions
              // that are often too narrow. We need to measure the actual HTML
              // content size and patch the SVG/foreignObject accordingly.
              svgEl.style.background = 'transparent';
              svgEl.style.overflow = 'visible';
              svgEl.style.maxWidth = 'none';
              // Use rAF to let the browser lay out foreignObject HTML content
              requestAnimationFrame(() => {
                const fo = svgEl.querySelector('foreignObject');
                if (fo) {
                  const inner = fo.firstElementChild;
                  if (inner) {
                    // Measure the actual content size
                    const actualW = inner.scrollWidth;
                    const actualH = inner.scrollHeight;
                    // Add padding for safety
                    const w = actualW + 20;
                    const h = actualH + 20;
                    // Patch foreignObject dimensions
                    fo.setAttribute('width', w);
                    fo.setAttribute('height', h);
                    // Patch the SVG element dimensions
                    svgEl.setAttribute('width', w);
                    svgEl.setAttribute('height', h);
                    svgEl.setAttribute('viewBox', `0 0 ${w} ${h}`);
                    svgEl.style.width = w + 'px';
                    svgEl.style.height = h + 'px';
                    svgEl.style.maxWidth = 'none';
                  }
                }
              });
            } else {
              svgEl.removeAttribute('style');
              svgEl.style.cssText = 'background:transparent;height:auto;';
            }
          }
          setStatus('ok', false);
          // Clean up any leftover Mermaid elements from body after render
          cleanupMermaidElements();
        } catch (err) {
          isRendering = false;
          // Remove any stray element Mermaid may have inserted into body or diagOut
          const stray = document.getElementById(id);
          if (stray) stray.remove();
          cleanupMermaidElements();
          diagOut.innerHTML = '<div class="error-message">⚠ Parse Error\n\n' + (err.message || String(err)) + '</div>';
          setStatus('error', true);
        }
      }

      // Clean up stray SVGs/divs Mermaid leaves in body after rendering
      function cleanupMermaidElements() {
        document.querySelectorAll('body > svg').forEach(el => el.remove());
        document.querySelectorAll('body > div').forEach(el => {
          if (el !== document.querySelector('.body-wrap')
            && el.tagName !== 'HEADER'
            && !el.closest('.body-wrap')
            && el.id !== 'exportModal') {
            el.remove();
          }
        });
      }

      function setStatus(t, isErr) {
        statusLbl.textContent = t;
        statusDot.className = 'status-dot' + (isErr ? ' error' : '');
      }

      editor.addEventListener('input', () => {
        // Fix smart punctuation (macOS/iOS auto-correct)
        const v = editor.value;
        const fixed = v
          .replace(/\u2014/g, '--')       // em-dash → --
          .replace(/\u2013/g, '-')        // en-dash → -
          .replace(/\u00BB/g, '>>')       // » → >>
          .replace(/\u00AB/g, '<<')       // « → <<
          .replace(/\u2018|\u2019/g, "'") // smart single quotes
          .replace(/\u201C|\u201D/g, '"');// smart double quotes
        if (fixed !== v) {
          const pos = editor.selectionStart;
          editor.value = fixed;
          editor.selectionStart = editor.selectionEnd = pos;
        }
        clearTimeout(renderTimer);
        renderTimer = setTimeout(render, 300);
      });

      /* ═══════════════════════════════════════
         SUPPRESS MERMAID BODY INJECTIONS
         v10 sometimes inserts elements into body.
         Remove anything injected that isn't ours.
      ═══════════════════════════════════════ */
      new MutationObserver(mutations => {
        // Skip cleanup while Mermaid is actively rendering — it creates
        // temporary SVG elements in body for text measurement.
        if (isRendering) return;
        for (const m of mutations) {
          for (const node of m.addedNodes) {
            if (node.nodeType !== 1 || node.parentElement !== document.body) continue;
            if (node.id === 'exportModal') continue;
            const tag = node.tagName.toLowerCase();
            if (tag === 'svg' || (tag === 'div' && !node.classList.contains('body-wrap'))) {
              node.remove();
            }
          }
        }
      }).observe(document.body, { childList: true });

      /* ═══════════════════════════════════════
         SIDEBAR
      ═══════════════════════════════════════ */
      function switchType(type) {
        document.querySelectorAll('.dtype-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('dtype-' + type).classList.add('active');
        document.querySelectorAll('.tpl-list').forEach(el => el.classList.remove('visible'));
        document.getElementById('tpl-' + type).classList.add('visible');
        currentType = type;
        typeTag.textContent = TYPE_LABELS[type];
        loadTemplate(TYPE_DEFAULT[type]);
      }

      function loadTemplate(key) {
        if (!T[key]) return;
        editor.value = T[key];
        resetView();
        clearTimeout(renderTimer);
        render();
      }

      document.querySelectorAll('.dtype-btn').forEach(btn =>
        btn.addEventListener('click', () => switchType(btn.dataset.type))
      );
      document.querySelectorAll('.tpl-btn').forEach(btn =>
        btn.addEventListener('click', () => loadTemplate(btn.dataset.tpl))
      );

      btnSB.addEventListener('click', () => {
        isSidebarOpen = !isSidebarOpen;
        sidebar.classList.toggle('collapsed', !isSidebarOpen);
        btnSB.classList.toggle('active', isSidebarOpen);
      });

      /* ═══════════════════════════════════════
         PAN / ZOOM
      ═══════════════════════════════════════ */
      function applyTransform() {
        canvas.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
        const pct = Math.round(scale * 100);
        zoomBadge.textContent = pct + '%';
        zoomSlider.value = pct;
      }
      function resetView() {
        tx = 0; ty = 0; scale = 1;
        canvas.classList.add('smooth-transform');
        applyTransform();
        setTimeout(() => canvas.classList.remove('smooth-transform'), 350);
      }
      btnReset.addEventListener('click', resetView);

      /* Zoom slider sync */
      const zoomSlider = document.getElementById('zoomSlider');
      const btnZoomIn = document.getElementById('btnZoomIn');
      const btnZoomOut = document.getElementById('btnZoomOut');

      zoomSlider.addEventListener('input', () => {
        const ns = Math.min(MAX_SCALE, Math.max(MIN_SCALE, zoomSlider.value / 100));
        const r = viewport.getBoundingClientRect();
        const cx = r.width / 2, cy = r.height / 2;
        const ratio = ns / scale;
        tx = cx - ratio * (cx - tx);
        ty = cy - ratio * (cy - ty);
        scale = ns;
        canvas.classList.remove('smooth-transform');
        applyTransform();
      });

      btnZoomIn.addEventListener('click', () => {
        const ns = Math.min(MAX_SCALE, scale * 1.2);
        const r = viewport.getBoundingClientRect();
        const cx = r.width / 2, cy = r.height / 2;
        const ratio = ns / scale;
        tx = cx - ratio * (cx - tx);
        ty = cy - ratio * (cy - ty);
        scale = ns;
        canvas.classList.add('smooth-transform');
        applyTransform();
        setTimeout(() => canvas.classList.remove('smooth-transform'), 350);
      });

      btnZoomOut.addEventListener('click', () => {
        const ns = Math.max(MIN_SCALE, scale / 1.2);
        const r = viewport.getBoundingClientRect();
        const cx = r.width / 2, cy = r.height / 2;
        const ratio = ns / scale;
        tx = cx - ratio * (cx - tx);
        ty = cy - ratio * (cy - ty);
        scale = ns;
        canvas.classList.add('smooth-transform');
        applyTransform();
        setTimeout(() => canvas.classList.remove('smooth-transform'), 350);
      });

      viewport.addEventListener('wheel', e => {
        e.preventDefault();
        canvas.classList.remove('smooth-transform');
        const r = viewport.getBoundingClientRect();
        const mx = e.clientX - r.left, my = e.clientY - r.top;

        if (e.ctrlKey) {
          // Pinch-to-zoom on trackpad
          const f = Math.exp(-e.deltaY * 0.01);
          const ns = Math.min(MAX_SCALE, Math.max(MIN_SCALE, scale * f));
          const ratio = ns / scale;
          tx = mx - ratio * (mx - tx);
          ty = my - ratio * (my - ty);
          scale = ns;
        } else {
          // Trackpad two-finger scroll or regular mouse wheel pan
          if (e.shiftKey) {
            tx -= e.deltaY * 1.5;
            ty -= e.deltaX * 1.5;
          } else {
            tx -= e.deltaX * 1.5;
            ty -= e.deltaY * 1.5;
          }
        }
        applyTransform();
      }, { passive: false });

      // --- Touch Gestures ---
      viewport.addEventListener('touchstart', e => {
        canvas.classList.remove('smooth-transform');
        if (e.touches.length === 2) {
          e.preventDefault();
          isTouchPanning = true;
          viewport.classList.add('panning');

          const t1 = e.touches[0];
          const t2 = e.touches[1];
          touchStartX = (t1.clientX + t2.clientX) / 2;
          touchStartY = (t1.clientY + t2.clientY) / 2;
          panOriginTx = tx;
          panOriginTy = ty;

          initialPinchDistance = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
          initialScale = scale;
        }
      }, { passive: false });

      viewport.addEventListener('touchmove', e => {
        if (isTouchPanning && e.touches.length === 2) {
          e.preventDefault();
          const t1 = e.touches[0];
          const t2 = e.touches[1];
          const mx = (t1.clientX + t2.clientX) / 2;
          const my = (t1.clientY + t2.clientY) / 2;
          const currentDistance = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);

          // Determine if pinching or just dragging
          if (initialPinchDistance && Math.abs(currentDistance - initialPinchDistance) > 10) {
            const ratioChange = currentDistance / initialPinchDistance;
            const ns = Math.min(MAX_SCALE, Math.max(MIN_SCALE, initialScale * ratioChange));

            const r = viewport.getBoundingClientRect();
            const viewportMx = mx - r.left;
            const viewportMy = my - r.top;

            // Pan relative to mid-point drag
            const currentPanX = panOriginTx + (mx - touchStartX);
            const currentPanY = panOriginTy + (my - touchStartY);

            // Apply zoom
            const ratio = ns / initialScale;
            tx = viewportMx - ratio * (viewportMx - currentPanX);
            ty = viewportMy - ratio * (viewportMy - currentPanY);
            scale = ns;
          } else {
            // Pan only
            tx = panOriginTx + (mx - touchStartX);
            ty = panOriginTy + (my - touchStartY);
          }
          applyTransform();
        }
      }, { passive: false });

      const endTouchGesture = () => {
        isTouchPanning = false;
        initialPinchDistance = null;
        viewport.classList.remove('panning');
      };
      viewport.addEventListener('touchend', e => { if (e.touches.length < 2) endTouchGesture(); });
      viewport.addEventListener('touchcancel', endTouchGesture);

      function startPan(x, y) {
        isPanning = true; panStartX = x; panStartY = y; panOriginTx = tx; panOriginTy = ty;
        viewport.classList.add('panning');
      }
      function movePan(x, y) {
        if (!isPanning) return;
        tx = panOriginTx + (x - panStartX); ty = panOriginTy + (y - panStartY);
        applyTransform();
      }
      function endPan() { isPanning = false; viewport.classList.remove('panning'); updateCursor(); }
      function updateCursor() { viewport.classList.toggle('space-held', spaceHeld && !isPanning); }

      window.addEventListener('keydown', e => {
        if (e.code === 'Space' && document.activeElement !== editor) { e.preventDefault(); spaceHeld = true; updateCursor(); }
      });
      window.addEventListener('keyup', e => {
        if (e.code === 'Space') { spaceHeld = false; if (!middleDown) endPan(); updateCursor(); }
      });
      viewport.addEventListener('mousedown', e => {
        if (e.button === 0 && spaceHeld) { e.preventDefault(); startPan(e.clientX, e.clientY); }
        if (e.button === 1) { e.preventDefault(); middleDown = true; startPan(e.clientX, e.clientY); }
      });
      window.addEventListener('mousemove', e => { if (isPanning) movePan(e.clientX, e.clientY); });
      window.addEventListener('mouseup', e => {
        if (e.button === 1) middleDown = false;
        if (isPanning && !spaceHeld && !middleDown) endPan();
        if (isPanning && e.button === 0 && !middleDown) endPan();
      });
      viewport.addEventListener('contextmenu', e => { if (middleDown) e.preventDefault(); });

      /* ═══════════════════════════════════════
         FULL WINDOW
      ═══════════════════════════════════════ */
      btnFull.addEventListener('click', () => {
        isFullWindow = !isFullWindow;
        edPanel.classList.toggle('hidden', isFullWindow);
        divider.style.display = isFullWindow ? 'none' : '';
        btnFull.innerHTML = isFullWindow ? '▣ Exit Full Window' : '⬜ Full Window';
        btnFull.classList.toggle('active', isFullWindow);
      });

      /* ═══════════════════════════════════════
         THEME
      ═══════════════════════════════════════ */
      function applyTheme() {
        document.body.removeAttribute('data-theme');
        if (!isDark) document.body.setAttribute('data-theme', 'light');
        btnTheme.textContent = isDark ? '☀' : '☾';
        mermaidTheme = isDark ? 'dark' : 'default';
        initMermaid();
        render();
      }
      btnTheme.addEventListener('click', () => { isDark = !isDark; applyTheme(); });

      /* ═══════════════════════════════════════
         CLEAR
      ═══════════════════════════════════════ */
      btnClear.addEventListener('click', () => { editor.value = ''; render(); resetView(); });

      /* ═══════════════════════════════════════
         DIVIDER DRAG
      ═══════════════════════════════════════ */
      divider.addEventListener('mousedown', e => {
        isDivDragging = true; divStartX = e.clientX;
        divStartW = edPanel.offsetWidth;
        divider.classList.add('dragging'); e.preventDefault();
      });
      window.addEventListener('mousemove', e => {
        if (!isDivDragging) return;
        const w = Math.max(200, Math.min(700, divStartW + e.clientX - divStartX));
        edPanel.style.width = w + 'px';
      });
      window.addEventListener('mouseup', () => {
        if (isDivDragging) { isDivDragging = false; divider.classList.remove('dragging'); }
      });

      /* ═══════════════════════════════════════
         EXPORT PANEL
      ═══════════════════════════════════════ */
      const btnExport = document.getElementById('btnExport');
      const exportModal = document.getElementById('exportModal');
      const btnCloseExport = document.getElementById('btnCloseExport');
      const btnCancelExport = document.getElementById('btnCancelExport');
      const btnConfirmExport = document.getElementById('btnConfirmExport');
      const expFormat = document.getElementById('expFormat');
      const expSize = document.getElementById('expSize');
      const groupOrientation = document.getElementById('groupOrientation');
      const groupMargin = document.getElementById('groupMargin');
      const expMargin = document.getElementById('expMargin');

      function toggleExportSettings() {
        // Only show orientation and margin if a specific paper size is selected
        const isFit = expSize.value === 'fit';
        groupOrientation.style.display = isFit ? 'none' : 'flex';
        groupMargin.style.display = isFit ? 'none' : 'flex';
      }

      expSize.addEventListener('change', toggleExportSettings);

      function openExportModal() {
        if (!diagOut.querySelector('svg')) {
          alert("Silakan buat diagram terlebih dahulu sebelum di-export.");
          return;
        }
        exportModal.classList.add('active');
      }

      function closeExportModal() {
        exportModal.classList.remove('active');
      }

      btnExport.addEventListener('click', openExportModal);
      btnCloseExport.addEventListener('click', closeExportModal);
      btnCancelExport.addEventListener('click', closeExportModal);
      exportModal.addEventListener('click', e => {
        if (e.target === exportModal) closeExportModal();
      });

      // ── Export Helpers ──
      // Inline all computed styles into SVG elements so the exported
      // image is self-contained and doesn't reference external CSS.
      function inlineStyles(srcEl, destEl) {
        const srcChildren = srcEl.children;
        const destChildren = destEl.children;
        for (let i = 0; i < srcChildren.length; i++) {
          const src = srcChildren[i];
          const dest = destChildren[i];
          if (!dest) continue;
          if (src instanceof HTMLElement || src instanceof SVGElement) {
            const computed = window.getComputedStyle(src);
            // Only inline visually-relevant properties to keep size manageable
            const props = [
              'font-family', 'font-size', 'font-weight', 'font-style',
              'fill', 'stroke', 'stroke-width', 'stroke-dasharray',
              'opacity', 'color', 'text-anchor', 'dominant-baseline',
              'visibility', 'display', 'overflow',
              'background', 'background-color',
              'border', 'border-radius', 'padding', 'margin',
              'line-height', 'letter-spacing', 'text-decoration',
              'white-space', 'word-break', 'box-sizing',
              'width', 'height', 'max-width', 'max-height',
              'min-width', 'min-height',
              'position', 'top', 'left', 'right', 'bottom',
              'flex', 'flex-direction', 'align-items', 'justify-content',
              'gap', 'text-align', 'vertical-align',
            ];
            let styleStr = '';
            for (const p of props) {
              const v = computed.getPropertyValue(p);
              if (v && v !== '' && v !== 'none' && v !== 'normal' && v !== 'auto') {
                styleStr += `${p}:${v};`;
              }
            }
            if (styleStr) {
              dest.setAttribute('style', (dest.getAttribute('style') || '') + styleStr);
            }
          }
          // Recurse
          if (src.children && src.children.length > 0) {
            inlineStyles(src, dest);
          }
        }
      }

      // Convert SVG element to a PNG data URL
      // Re-renders diagram with light theme for consistent, clean exports
      async function svgToPngDataUrl(svgEl) {
        // Prevent MutationObserver from removing our temp containers
        isRendering = true;

        try {
          // ── Step 1: Re-render diagram with light (default) theme ──
          const code = editor.value.trim();
          if (!code) throw new Error('No diagram code to export');

          // Save current mermaid theme, switch to light for export
          const savedTheme = mermaidTheme;
          mermaidTheme = 'default';
          initMermaid();

          // Render in a hidden off-screen container
          const tmpContainer = document.createElement('div');
          tmpContainer.style.cssText = 'position:absolute;left:-9999px;top:-9999px;width:1500px;height:1000px;';
          document.body.appendChild(tmpContainer);

          const tmpId = 'export_' + Date.now();
          let exportSvgHtml;
          try {
            const result = await mermaid.render(tmpId, code, tmpContainer);
            exportSvgHtml = result.svg;
          } finally {
            tmpContainer.remove();
            // Restore original theme immediately
            mermaidTheme = savedTheme;
            initMermaid();
          }

          // Parse the fresh light-theme SVG
          const wrapper = document.createElement('div');
          wrapper.innerHTML = exportSvgHtml;
          const freshSvg = wrapper.querySelector('svg');
          if (!freshSvg) throw new Error('Failed to render export SVG');

          // ── Step 2: Measure dimensions ──
          // Temporarily insert into DOM to measure (off-screen)
          const measureDiv = document.createElement('div');
          measureDiv.style.cssText = 'position:absolute;left:-9999px;top:-9999px;';
          measureDiv.appendChild(freshSvg);
          document.body.appendChild(measureDiv);

          let w = freshSvg.getBoundingClientRect().width;
          let h = freshSvg.getBoundingClientRect().height;

          const attrW = parseFloat(freshSvg.getAttribute('width'));
          const attrH = parseFloat(freshSvg.getAttribute('height'));
          if (attrW && attrW > 0) w = attrW;
          if (attrH && attrH > 0) h = attrH;

          // Inline computed styles from the measured SVG
          const clone = freshSvg.cloneNode(true);
          inlineStyles(freshSvg, clone);

          measureDiv.remove();

          // ── Step 3: Prepare standalone SVG ──
          clone.setAttribute('width', w);
          clone.setAttribute('height', h);
          if (!clone.getAttribute('viewBox')) {
            clone.setAttribute('viewBox', `0 0 ${w} ${h}`);
          }
          clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
          clone.setAttribute('xmlns:xlink', 'http://www.w3.org/1999/xlink');

          // Force white background
          const bgColor = '#ffffff';

          // Remove any background from SVG root
          clone.removeAttribute('style');
          clone.style.cssText = 'background:transparent;';

          // Insert white background rect as first element
          const bgRect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
          bgRect.setAttribute('width', '100%');
          bgRect.setAttribute('height', '100%');
          bgRect.setAttribute('fill', bgColor);
          clone.insertBefore(bgRect, clone.firstChild);

          // Add fallback font
          const styleEl = document.createElementNS('http://www.w3.org/2000/svg', 'style');
          styleEl.textContent = `* { font-family: 'JetBrains Mono', 'Segoe UI', 'Arial', monospace, sans-serif; }`;
          clone.insertBefore(styleEl, clone.firstChild);

          // Handle foreignObject xhtml namespace
          clone.querySelectorAll('foreignObject').forEach(fo => {
            const children = fo.children;
            for (let i = 0; i < children.length; i++) {
              children[i].setAttribute('xmlns', 'http://www.w3.org/1999/xhtml');
            }
          });

          // ── Step 4: Render to canvas via data URL ──
          const serializer = new XMLSerializer();
          const svgString = serializer.serializeToString(clone);
          const dataUrl = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgString);

          const img = new Image();
          await new Promise((resolve, reject) => {
            img.onload = resolve;
            img.onerror = () => reject(new Error('Failed to load SVG image for export'));
            img.src = dataUrl;
          });

          const scaleFactor = 2;
          const exportCanvas = document.createElement('canvas');
          exportCanvas.width = w * scaleFactor;
          exportCanvas.height = h * scaleFactor;
          const ctx = exportCanvas.getContext('2d');

          ctx.fillStyle = bgColor;
          ctx.fillRect(0, 0, exportCanvas.width, exportCanvas.height);
          ctx.drawImage(img, 0, 0, exportCanvas.width, exportCanvas.height);

          return { pngDataUrl: exportCanvas.toDataURL('image/png', 1.0), w, h };

        } finally {
          isRendering = false;
        }
      }

      // Export Action
      btnConfirmExport.addEventListener('click', async () => {
        const svgEl = diagOut.querySelector('svg');
        if (!svgEl) return;

        btnConfirmExport.textContent = 'Exporting...';
        btnConfirmExport.disabled = true;

        try {
          const { pngDataUrl, w, h } = await svgToPngDataUrl(svgEl);

          const format = expFormat.value;
          const sizeType = expSize.value;
          let filename = 'diagram_' + Date.now();

          if (format === 'png') {
            const a = document.createElement('a');
            a.href = pngDataUrl;
            a.download = filename + '.png';
            a.click();
          } else if (format === 'pdf') {
            if (!window.jspdf || !window.jspdf.jsPDF) {
              throw new Error("jsPDF library failed to load");
            }

            const { jsPDF } = window.jspdf;

            if (sizeType === 'fit') {
              const pdf = new jsPDF({
                orientation: w > h ? 'l' : 'p',
                unit: 'px',
                format: [w, h]
              });
              pdf.addImage(pngDataUrl, 'PNG', 0, 0, w, h);
              pdf.save(filename + '.pdf');
            } else {
              const oriStr = document.querySelector('input[name="expOri"]:checked').value;
              const ori = oriStr === 'portrait' ? 'p' : 'l';

              const pdf = new jsPDF({ orientation: ori, unit: 'mm', format: sizeType });

              const margin = parseFloat(expMargin.value) || 0;
              const pageWidth = pdf.internal.pageSize.getWidth();
              const pageHeight = pdf.internal.pageSize.getHeight();

              const availWidth = pageWidth - (margin * 2);
              const availHeight = pageHeight - (margin * 2);

              const imgRatio = w / h;
              let renderWidth = availWidth;
              let renderHeight = availWidth / imgRatio;

              if (renderHeight > availHeight) {
                renderHeight = availHeight;
                renderWidth = renderHeight * imgRatio;
              }

              const xPos = margin + ((availWidth - renderWidth) / 2);
              const yPos = margin + ((availHeight - renderHeight) / 2);

              pdf.addImage(pngDataUrl, 'PNG', xPos, yPos, renderWidth, renderHeight);
              pdf.save(filename + '.pdf');
            }
          }

        } catch (err) {
          console.error("Export error:", err);
          alert("Gagal melakukan export: " + err.message);
        } finally {
          btnConfirmExport.textContent = 'Download';
          btnConfirmExport.disabled = false;
          closeExportModal();
        }
      });

      /* ═══════════════════════════════════════
         INIT
      ═══════════════════════════════════════ */
      loadTemplate('flowchart-basic');
      applyTransform();

    })();
  </script>
</body>

</html>
